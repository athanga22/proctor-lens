name: ProctorLens
options:
  bundleIdPrefix: com.ashish
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_PREVIEWS: "YES"

targets:
  ProctorLens:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ProctorLens
        excludes:
          - "**/*.md"
    resources:
      - path: ProctorLens/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ashish.ProctorLens
      INFOPLIST_FILE: ProctorLens/Info.plist
      TARGETED_DEVICE_FAMILY: "2"
      SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
    entitlements:
      path: ProctorLens/ProctorLens.entitlements
